<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ASL Node Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>

<body>
  <main class="app-shell" role="main">
    <header class="status-header" aria-labelledby="app-title">
      <div class="title-row">
        <div>
          <h1 id="app-title">ASL Node Panel</h1>
          <p id="connectionStatus" class="muted">Not connected</p>
        </div>

        <div class="header-actions">
          <button id="toggleMode" class="icon-button mode-toggle-btn" type="button" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">
            ☀
          </button>
          <button id="openSettings" class="icon-button" type="button" title="Open settings" aria-label="Open settings">
            ⚙
          </button>
        </div>
      </div>

      <section class="node-summary" aria-label="Node status summary">
        <div class="summary-card">
          <span class="summary-label" id="lbl-node">Node</span>
          <strong id="statusNode" aria-labelledby="lbl-node">—</strong>
        </div>

        <div class="summary-card">
          <span class="summary-label" id="lbl-callsign">Callsign</span>
          <strong id="statusCallsign" aria-labelledby="lbl-callsign">—</strong>
        </div>

        <div class="summary-card">
          <span class="summary-label" id="lbl-keyups">Keyups Today</span>
          <strong id="statusKeyups" aria-labelledby="lbl-keyups">—</strong>
        </div>

        <div class="summary-card">
          <span class="summary-label" id="lbl-connected">Connected Nodes</span>
          <strong id="statusConnectedCount" aria-labelledby="lbl-connected">—</strong>
        </div>
      <div class="summary-card">
          <span class="summary-label" id="lbl-uptime">Uptime</span>
          <strong id="statusUptime" aria-labelledby="lbl-uptime">—</strong>
        </div>
        <div class="summary-card keyed-card">
          <span id="statusRxKeyed" class="keyed-badge rx"></span>
          <span id="statusTxKeyed" class="keyed-badge tx"></span>
        </div>
      </section>
      <div class="node-stats-row">
        <div class="stat-pill"><span class="stat-label">TX Today</span><span id="statusTxToday">—</span></div>
        <div class="stat-pill"><span class="stat-label">TX Total</span><span id="statusTxTotal">—</span></div>
        <div id="nodeCountWarningBadge" class="node-count-warning" hidden>⚠ HIGH CONN</div>
      </div>
    </header>

    <section class="panel-section" aria-labelledby="connect-title">
      <div class="section-title-row">
        <button class="section-toggle" id="toggle-connect" aria-expanded="true" aria-controls="connect-body">Connect Node <span class="toggle-icon">▾</span></button>
      </div>
      <div class="section-body" id="connect-body">

      <form id="connectForm" class="connect-form" aria-label="Connect to a node">
        <label class="sr-only" for="connectNodeInput">Node number</label>
        <input
          id="connectNodeInput"
          type="text"
          inputmode="numeric"
          placeholder="Enter node number"
          autocomplete="off"
          spellcheck="false"
        />

        <div id="nodeLookupResult" class="node-lookup-result" hidden></div>

        <div class="button-row">
          <button id="connectTransceive" type="submit" data-connect-mode="transceive">
            Connect T
          </button>

          <button id="connectMonitor" class="secondary" type="button" data-connect-mode="monitor">
            Monitor R
          </button>
        </div>
      </form>
      </div>
    </section>

    <section class="panel-section" aria-labelledby="favorites-title">
      <div class="section-title-row">
        <button class="section-toggle" id="toggle-favorites" aria-expanded="true" aria-controls="favorites-body">Favorites <span class="toggle-icon">▾</span></button>
        <button id="refreshFavorites" class="small secondary" type="button">Refresh</button>
      </div>
      <div class="section-body" id="favorites-body">

      <div id="favoritesList" class="favorites-list" aria-live="polite">
        <div class="empty-state">No favorites configured.</div>
      </div>
      </div>
    </section>

    <section class="panel-section connected-section" aria-labelledby="connected-title">
      <div class="section-title-row">
        <button class="section-toggle" id="toggle-connected" aria-expanded="true" aria-controls="connected-body">Connected Nodes <span class="toggle-icon">▾</span></button>
        <div class="section-actions">
          <button id="refreshStatus" class="small secondary" type="button">Refresh</button>
          <button id="disconnectAll" class="small danger" type="button">Disconnect All</button>
        </div>
      </div>
      <div class="section-body" id="connected-body">

      <div id="busyMessage" class="busy-message" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span id="busyText">Working…</span>
      </div>

      <div id="connectedNodesList" class="connected-nodes-list" aria-live="polite">
        <div class="empty-state">No connected nodes loaded yet.</div>
      </div>
      </div>
    </section>

    <section class="panel-section" aria-labelledby="cop-title" aria-label="Courtesy-operation-position controls">
      <div class="section-title-row">
        <button class="section-toggle" id="toggle-cop" aria-expanded="true" aria-controls="cop-body">COP Controls <span class="toggle-icon">▾</span></button>
      </div>
      <div class="section-body" id="cop-body">
        <div class="cop-grid">
          <button id="copIdentify" type="button">Identify</button>
          <button id="copTime" type="button" class="secondary">Time</button>
          <button id="copStatus" type="button" class="secondary">Status</button>
          <button id="copVersion" type="button" class="secondary">Version</button>
        </div>
      </div>
    </section>

    <section class="panel-section" aria-labelledby="dtmf-title">
      <div class="section-title-row">
        <button class="section-toggle" id="toggle-dtmf" aria-expanded="true" aria-controls="dtmf-body">DTMF <span class="toggle-icon">▾</span></button>
      </div>
      <div class="section-body" id="dtmf-body">
        <div id="dtmfMacrosGrid" class="dtmf-macros-grid"></div>

      <form id="dtmfForm" class="dtmf-form" aria-label="Send DTMF sequence">
        <label class="sr-only" for="dtmfInput">DTMF sequence</label>
        <input
          id="dtmfInput"
          type="text"
          placeholder="DTMF sequence"
          autocomplete="off"
          spellcheck="false"
        />

        <button id="sendDtmf" type="submit">
          Send
        </button>
      </form>

      <p class="hint">
        DTMF requests are sent with <code>confirmed: true</code>.
      </p>
      </div>
    </section>

    <section class="panel-section audit-section" aria-labelledby="audit-title">
      <div class="section-title-row">
        <button class="section-toggle" id="toggle-audit" aria-expanded="true" aria-controls="audit-body">Audit Log <span class="toggle-icon">▾</span></button>
        <button id="refreshAudit" class="small secondary" type="button">Refresh</button>
      </div>
      <div class="section-body" id="audit-body">

      <div id="auditLog" class="audit-log" aria-live="polite">
        <div class="empty-state">No audit entries loaded yet.</div>
      </div>
      </div>
    </section>

    <div id="scheduleIndicator" class="schedule-indicator" hidden></div>
    <div id="srAnnouncer" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div id="srAnnouncerAssertive" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
    <footer class="footer-status">
      <span id="footerMessage" role="status" aria-live="polite"></span>
    </footer>
  </main>

  <script type="module" src="services/theme.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
